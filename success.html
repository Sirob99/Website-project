<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bericht Verstuurd - BSF-studie</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #4A7C9E 0%, #37B5B6 100%);
            padding: 20px;
        }
        
        .success-content {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .success-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: checkmark 0.6s ease-in-out;
        }
        
        .success-content h1 {
            color: #4A7C9E;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .success-content p {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .success-content .btn {
            margin-top: 30px;
            display: inline-block;
        }
        
        @keyframes checkmark {
            0% {
                transform: scale(0) rotate(-45deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }
        
        .redirect-info {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <h1>Dank u wel!</h1>
            <p>Uw bericht is succesvol verstuurd.</p>
            <p>We hebben uw contactgegevens ontvangen en zullen u zo snel mogelijk contacteren. Bedankt dat u voor BSF-studie hebt gekozen!</p>
            <p style="font-weight: 600; color: #4A7C9E;">Er is een bevestigings-e-mail verzonden naar uw e-mailadres.</p>
            
            <button class="btn btn-primary" onclick="window.location.href='index.html'">Terug naar Homepage</button>
            
            <div class="redirect-info">
                <p>U wordt automatisch doorgestuurd naar de homepage...</p>
            </div>
        </div>
    </div>
    
    <script>
        // Redirect to homepage after 5 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 5000);
    </script>
</body>
</html>
